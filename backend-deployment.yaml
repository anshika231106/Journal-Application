apiVersion: apps/v1
kind: Deployment
metadata:
  name: journal-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: journal
  template:
    metadata:
      labels:
        app: journal
    spec:
      containers:
      - name: journal
        image: journal-app
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URL
          value: "mongodb://mongo:27017/journaldb"